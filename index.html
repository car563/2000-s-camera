<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2004 Flip Phone Recorder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
            touch-action: none; /* Prevents pull-to-refresh on mobile */
        }

        #camera-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
        }

        #display {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Screen flash effect for taking photos */
        #flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: white;
            opacity: 0;
            pointer-events: none;
            z-index: 30;
            transition: opacity 0.1s ease-out;
        }

        /* UI Overlay */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
            display: none;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            text-shadow: 2px 2px 0px #000;
        }

        .ui-top {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .rec-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            visibility: hidden; /* Hidden until recording starts */
        }

        .red-dot {
            width: 14px;
            height: 14px;
            background-color: #ff0000;
            border-radius: 50%;
            animation: blink 1s infinite;
            border: 1px solid #fff;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        /* Controls */
        .ui-bottom {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 20px;
            pointer-events: auto; /* Allow clicking buttons */
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid #fff;
            color: #fff;
            padding: 15px 25px;
            border-radius: 8px;
            font-family: inherit;
            font-weight: bold;
            font-size: 1rem;
            backdrop-filter: blur(4px);
            cursor: pointer;
            text-shadow: 1px 1px 0 #000;
        }

        .control-btn:active {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(0.95);
        }

        .record-btn-active {
            background: rgba(255, 0, 0, 0.4);
            border-color: #ff4444;
        }

        /* Start Screen */
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #111;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50;
        }

        .launch-btn {
            background-color: #333;
            color: #fff;
            border: 2px solid #666;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 20px;
        }

        #error-msg {
            color: #ff4444;
            margin-top: 20px;
            max-width: 80%;
            text-align: center;
        }

    </style>
</head>
<body>

    <video id="webcam" autoplay playsinline style="display: none;"></video>

    <div id="camera-container">
        <canvas id="display"></canvas>
        <div id="flash"></div>
        
        <div class="ui-layer" id="ui-layer">
            <div class="ui-top">
                <div class="rec-indicator" id="rec-indicator">
                    <div class="red-dot"></div>
                    REC
                </div>
                <div id="time-stamp">00:00:00</div>
            </div>
            
            <div class="ui-bottom">
                <button id="photo-btn" class="control-btn">SNAP</button>
                <button id="video-btn" class="control-btn">VIDEO</button>
            </div>
        </div>
    </div>

    <div id="start-screen">
        <h1 class="text-3xl font-bold mb-2 text-center text-white">Media Recorder</h1>
        <p class="text-sm mb-8 text-center text-gray-400">Save to Device Enabled</p>
        
        <button id="start-btn" class="launch-btn">Open Camera</button>
        <div id="error-msg"></div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const displayCanvas = document.getElementById('display');
        const ctx = displayCanvas.getContext('2d', { alpha: false });
        
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');
        const errorMsg = document.getElementById('error-msg');
        const uiLayer = document.getElementById('ui-layer');
        const timeStamp = document.getElementById('time-stamp');
        const flash = document.getElementById('flash');
        const recIndicator = document.getElementById('rec-indicator');
        
        const photoBtn = document.getElementById('photo-btn');
        const videoBtn = document.getElementById('video-btn');

        // Capture Settings
        const TARGET_FPS = 12; // Choppy framerate
        const frameInterval = 1000 / TARGET_FPS;
        let lastFrameTime = 0;
        
        // Internal processing resolution (QCIF standard for old phones)
        const INTERNAL_WIDTH = 176;
        const INTERNAL_HEIGHT = 144; 
        
        const offCanvas = document.createElement('canvas');
        offCanvas.width = INTERNAL_WIDTH;
        offCanvas.height = INTERNAL_HEIGHT;
        const offCtx = offCanvas.getContext('2d', { alpha: false });

        // Recording State
        let mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;
        let recordingTimerInterval;
        let recordingTime = 0;

        function updateTimerDisplay() {
            const hrs = String(Math.floor(recordingTime / 3600)).padStart(2, '0');
            const mins = String(Math.floor((recordingTime % 3600) / 60)).padStart(2, '0');
            const secs = String(recordingTime % 60).padStart(2, '0');
            timeStamp.innerText = `${hrs}:${mins}:${secs}`;
        }

        // Handle Canvas Resize
        function resizeCanvas() {
            displayCanvas.width = window.innerWidth;
            displayCanvas.height = window.innerHeight;
            // Leave image smoothing ON to create the blurred/mushy look when scaled up
            ctx.imageSmoothingEnabled = true; 
            ctx.imageSmoothingQuality = 'low'; 
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // ----------------------------------------------------
        // INITIALIZATION
        // ----------------------------------------------------
        startBtn.addEventListener('click', async () => {
            try {
                errorMsg.style.display = 'none';
                startBtn.innerText = "Loading...";
                
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false // No audio to prevent feedback/permission issues on simple web apps
                });

                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    video.play();
                    startScreen.style.display = 'none';
                    uiLayer.style.display = 'flex';
                    requestAnimationFrame(renderLoop);
                };

            } catch (err) {
                try {
                     const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                    video.srcObject = stream;
                    video.onloadedmetadata = () => {
                        video.play();
                        startScreen.style.display = 'none';
                        uiLayer.style.display = 'flex';
                        requestAnimationFrame(renderLoop);
                    };
                } catch(err2) {
                    errorMsg.innerText = "Camera access denied. Please allow permissions.";
                    errorMsg.style.display = 'block';
                    startBtn.innerText = "Try Again";
                }
            }
        });

        // ----------------------------------------------------
        // MEDIA CAPTURE LOGIC
        // ----------------------------------------------------

        // Download helper
        function triggerDownload(url, filename) {
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => {
                document.body.removeChild(a);
            }, 100);
        }

        // Take Photo
        photoBtn.addEventListener('click', () => {
            if (isRecording) return; // Don't allow photo while recording

            // Flash effect
            flash.style.opacity = 1;
            setTimeout(() => flash.style.opacity = 0, 150);

            // Export current canvas as JPEG (Low quality for retro feel)
            const dataURL = displayCanvas.toDataURL('image/jpeg', 0.6);
            triggerDownload(dataURL, `IMG_${Date.now()}.jpg`);
        });

        // Toggle Video Recording
        videoBtn.addEventListener('click', () => {
            if (!isRecording) {
                startRecording();
            } else {
                stopRecording();
            }
        });

        function startRecording() {
            recordedChunks = [];
            
            // Capture stream directly from the canvas we are drawing to
            const stream = displayCanvas.captureStream(TARGET_FPS);
            
            // Determine best supported format (MP4 for iOS/Safari, WebM for Chrome/Android)
            let options = { mimeType: 'video/webm;codecs=vp9' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                options = { mimeType: 'video/webm' };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options = { mimeType: 'video/mp4' }; 
                }
            }

            try {
                mediaRecorder = new MediaRecorder(stream, options);
            } catch (e) {
                alert("Recording not supported on this browser.");
                return;
            }

            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    recordedChunks.push(event.data);
                }
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: options.mimeType });
                const url = URL.createObjectURL(blob);
                const ext = options.mimeType.includes('mp4') ? 'mp4' : 'webm';
                triggerDownload(url, `VID_${Date.now()}.${ext}`);
                URL.revokeObjectURL(url);
            };

            mediaRecorder.start();
            isRecording = true;
            
            // UI Updates
            videoBtn.innerText = "STOP";
            videoBtn.classList.add('record-btn-active');
            photoBtn.style.opacity = "0.3"; 
            recIndicator.style.visibility = "visible";
            
            // Start Timer
            recordingTime = 0;
            updateTimerDisplay();
            recordingTimerInterval = setInterval(() => {
                recordingTime++;
                updateTimerDisplay();
            }, 1000);
        }

        function stopRecording() {
            mediaRecorder.stop();
            isRecording = false;
            
            // UI Updates
            videoBtn.innerText = "VIDEO";
            videoBtn.classList.remove('record-btn-active');
            photoBtn.style.opacity = "1";
            recIndicator.style.visibility = "hidden";
            
            // Stop Timer
            clearInterval(recordingTimerInterval);
        }

        // ----------------------------------------------------
        // IMAGE PROCESSING LOOP
        // ----------------------------------------------------
        function renderLoop(timestamp) {
            requestAnimationFrame(renderLoop);

            const elapsed = timestamp - lastFrameTime;
            if (elapsed < frameInterval) return;
            lastFrameTime = timestamp - (elapsed % frameInterval);

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                
                // 1. Draw raw video to tiny canvas
                const videoAspect = video.videoWidth / video.videoHeight;
                const canvasAspect = INTERNAL_WIDTH / INTERNAL_HEIGHT;
                
                let drawWidth = INTERNAL_WIDTH;
                let drawHeight = INTERNAL_HEIGHT;
                let offsetX = 0;
                let offsetY = 0;

                if (videoAspect > canvasAspect) {
                    drawWidth = INTERNAL_HEIGHT * videoAspect;
                    offsetX = -(drawWidth - INTERNAL_WIDTH) / 2;
                } else {
                    drawHeight = INTERNAL_WIDTH / videoAspect;
                    offsetY = -(drawHeight - INTERNAL_HEIGHT) / 2;
                }

                offCtx.drawImage(video, offsetX, offsetY, drawWidth, drawHeight);

                // 2. Apply "Early Digital Video" filter
                let imgData = offCtx.getImageData(0, 0, INTERNAL_WIDTH, INTERNAL_HEIGHT);
                let data = imgData.data;

                const contrast = 75; 
                const contrastFactor = (259 * (contrast + 255)) / (255 * (259 - contrast));
                const saturation = 0.35; 

                for (let i = 0; i < data.length; i += 4) {
                    let r = data[i];
                    let g = data[i + 1];
                    let b = data[i + 2];

                    // Contrast Step
                    r = contrastFactor * (r - 128) + 128;
                    g = contrastFactor * (g - 128) + 128;
                    b = contrastFactor * (b - 128) + 128;

                    let luma = 0.299 * r + 0.587 * g + 0.114 * b;

                    // Highlight Blooming & Shadow Crushing
                    if (luma > 160) {
                        const over = (luma - 160) * 1.8;
                        r += over; g += over; b += over;
                    } else if (luma < 90) {
                        const under = (90 - luma) * 1.5;
                        r -= under; g -= under; b -= under;
                    }

                    // Desaturation
                    let newLuma = 0.299 * r + 0.587 * g + 0.114 * b;
                    r = newLuma + saturation * (r - newLuma);
                    g = newLuma + saturation * (g - newLuma);
                    b = newLuma + saturation * (b - newLuma);

                    data[i] = Math.min(255, Math.max(0, r));
                    data[i + 1] = Math.min(255, Math.max(0, g));
                    data[i + 2] = Math.min(255, Math.max(0, b));
                }
                
                offCtx.putImageData(imgData, 0, 0);

                // 3. Draw to main screen WITH SMOOTHING ON
                const displayAspect = displayCanvas.width / displayCanvas.height;
                let finalWidth = displayCanvas.width;
                let finalHeight = displayCanvas.height;
                let finalX = 0;
                let finalY = 0;

                if (canvasAspect > displayAspect) {
                    finalWidth = displayCanvas.height * canvasAspect;
                    finalX = -(finalWidth - displayCanvas.width) / 2;
                } else {
                    finalHeight = displayCanvas.width / canvasAspect;
                    finalY = -(finalHeight - displayCanvas.height) / 2;
                }

                ctx.drawImage(offCanvas, finalX, finalY, finalWidth, finalHeight);
            }
        }
    </script>
</body>
</html>
