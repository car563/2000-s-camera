<body>

    <video id="webcam" autoplay playsinline style="display: none;"></video>

    <!-- Camera View -->
    <div id="camera-container">
        <canvas id="display"></canvas>
        <div id="flash"></div>
        <div id="toast">SAVED TO STORAGE</div>
        
        <div class="ui-layer" id="ui-layer">
            <div class="ui-top">
                <div class="rec-indicator" id="rec-indicator">

                </div>

            <div class="ui-bottom">

                    <button id="photo-btn" class="control-btn">SNAP</button>
                    <button id="video-btn" class="control-btn">VIDEO</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Storage Gallery View -->
    <div id="gallery-container">
        <div class="gallery-header">
            <h2 class="text-xl font-bold">SD CARD</h2>
            <button id="btn-close-gallery" class="control-btn" style="padding: 8px 15px;">BACK</button>

        </div>
    </div>

    <!-- Boot Screen -->
    <div id="start-screen">
        <h1 class="text-3xl font-bold mb-2 text-center text-white">Media Recorder</h1>
        <p class="text-sm mb-8 text-center text-gray-400">Smooth Glitch Engine Active</p>
        <button id="start-btn" class="launch-btn">Power On</button>
        <div id="error-msg" class="text-red-500 mt-4 hidden"></div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const displayCanvas = document.getElementById('display');
        const ctx = displayCanvas.getContext('2d', { alpha: false });
        
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');
        const uiLayer = document.getElementById('ui-layer');
        const timeStamp = document.getElementById('time-stamp');
        const flash = document.getElementById('flash');
        const toast = document.getElementById('toast');
        const recIndicator = document.getElementById('rec-indicator');
        
        const photoBtn = document.getElementById('photo-btn');
        const videoBtn = document.getElementById('video-btn');
        const galleryBtn = document.getElementById('btn-gallery');

        // Gallery Elements
        const galleryContainer = document.getElementById('gallery-container');
        const galleryGrid = document.getElementById('gallery-grid');
        const closeGalleryBtn = document.getElementById('btn-close-gallery');
        const mediaViewer = document.getElementById('media-viewer');
        const viewerContent = document.getElementById('viewer-content');
        const viewerBackBtn = document.getElementById('btn-viewer-back');
        const viewerDownloadBtn = document.getElementById('btn-viewer-download');

        // Session Storage Array
        const storageGallery = []; 
        let currentViewingItem = null;

        // Capture Settings (Smoothed Out)
        const TARGET_FPS = 24; // Increased from 15 to 24 for smoother motion
        const frameInterval = 1000 / TARGET_FPS;
        let lastFrameTime = 0;
        
        // Increased resolution for smoother visuals
        const INTERNAL_WIDTH = 480;
        const INTERNAL_HEIGHT = 360; 
        
        const offCanvas = document.createElement('canvas');
        offCanvas.width = INTERNAL_WIDTH;
        offCanvas.height = INTERNAL_HEIGHT;
        const offCtx = offCanvas.getContext('2d', { alpha: false });

        // Recording State
        let mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;
        let recordingTimerInterval;
        let recordingTime = 0;

        function updateTimerDisplay() {
            const hrs = String(Math.floor(recordingTime / 3600)).padStart(2, '0');
            const mins = String(Math.floor((recordingTime % 3600) / 60)).padStart(2, '0');
            const secs = String(recordingTime % 60).padStart(2, '0');
            timeStamp.innerText = `${hrs}:${mins}:${secs}`;
        }

        function showToast(msg) {
            toast.innerText = msg;
            toast.style.opacity = 1;
            setTimeout(() => toast.style.opacity = 0, 2000);
        }

        function resizeCanvas() {
            displayCanvas.width = window.innerWidth;
            displayCanvas.height = window.innerHeight;
            // Medium smoothing prevents harsh jagged edges while keeping it a bit soft
            ctx.imageSmoothingEnabled = true; 
            ctx.imageSmoothingQuality = 'medium'; 
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // ----------------------------------------------------
        // INITIALIZATION
        // ----------------------------------------------------
        startBtn.addEventListener('click', async () => {
            try {
                startBtn.innerText = "Loading...";
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 640 }, height: { ideal: 480 } }
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    startScreen.style.display = 'none';
                    uiLayer.style.display = 'flex';
                    requestAnimationFrame(renderLoop);
                };
            } catch (err) {
                try {
                     const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                    video.srcObject = stream;
                    video.onloadedmetadata = () => {
                        video.play();
                        startScreen.style.display = 'none';
                        uiLayer.style.display = 'flex';
                        requestAnimationFrame(renderLoop);
                    };
                } catch(err2) {
                    alert("Camera access denied.");
                    startBtn.innerText = "Try Again";
                }
            }
        });

        // ----------------------------------------------------
        // MEDIA CAPTURE & STORAGE
        // ----------------------------------------------------

        function saveToStorage(blob, type) {
            const url = URL.createObjectURL(blob);
            const item = {
                id: Date.now(),
                type: type, // 'image' or 'video'
                url: url,
                ext: type === 'image' ? 'jpg' : 'webm'
            };
            storageGallery.unshift(item); // Add to beginning of array
            showToast("SAVED TO STORAGE");
            renderGallery();
        }

        photoBtn.addEventListener('click', () => {
            if (isRecording) return; 

            flash.style.opacity = 1;
            setTimeout(() => flash.style.opacity = 0, 150);

            displayCanvas.toBlob((blob) => {
                saveToStorage(blob, 'image');
            }, 'image/jpeg', 0.8); // Slightly higher JPEG quality
        });

        videoBtn.addEventListener('click', () => {
            if (!isRecording) startRecording();
            else stopRecording();
        });

        function startRecording() {
            recordedChunks = [];
            const stream = displayCanvas.captureStream(TARGET_FPS);
            
            let options = { mimeType: 'video/webm;codecs=vp9' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                options = { mimeType: 'video/webm' };
            }

            try { mediaRecorder = new MediaRecorder(stream, options); } 
            catch (e) { alert("Recording not supported."); return; }

            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: options.mimeType });
                saveToStorage(blob, 'video');
            };

            mediaRecorder.start();
            isRecording = true;
            
            videoBtn.innerText = "STOP";
            videoBtn.classList.add('record-btn-active');
            photoBtn.style.opacity = "0.3"; 
            galleryBtn.style.opacity = "0.3";
            galleryBtn.style.pointerEvents = "none";
            recIndicator.style.visibility = "visible";
            
            recordingTime = 0;
            updateTimerDisplay();
            recordingTimerInterval = setInterval(() => {
                recordingTime++;
                updateTimerDisplay();
            }, 1000);
        }

        function stopRecording() {
            mediaRecorder.stop();
            isRecording = false;
            
            videoBtn.innerText = "VIDEO";
            videoBtn.classList.remove('record-btn-active');
            photoBtn.style.opacity = "1";
            galleryBtn.style.opacity = "1";
            galleryBtn.style.pointerEvents = "auto";
            recIndicator.style.visibility = "hidden";
            clearInterval(recordingTimerInterval);
        }

        // ----------------------------------------------------
        // GALLERY LOGIC
        // ----------------------------------------------------
        
        galleryBtn.addEventListener('click', () => {
            galleryContainer.style.display = 'flex';
            uiLayer.style.display = 'none';
        });

        closeGalleryBtn.addEventListener('click', () => {
            galleryContainer.style.display = 'none';
            uiLayer.style.display = 'flex';
        });

        function renderGallery() {
            galleryGrid.innerHTML = '';
            storageGallery.forEach(item => {
                const el = document.createElement('div');
                el.className = 'gallery-item';
                el.onclick = () => openViewer(item);

                if (item.type === 'image') {
                    el.innerHTML = `<img src="${item.url}"><div class="item-icon">IMG</div>`;
                } else {
                    el.innerHTML = `<video src="${item.url}#t=0.1" preload="metadata" muted></video><div class="item-icon">VID</div>`;
                }
                galleryGrid.appendChild(el);
            });
        }

        function openViewer(item) {
            currentViewingItem = item;
            viewerContent.innerHTML = '';
            
            if (item.type === 'image') {
                const img = document.createElement('img');
                img.src = item.url;
                viewerContent.appendChild(img);
            } else {
                const vid = document.createElement('video');
                vid.src = item.url;
                vid.controls = true;
                vid.autoplay = true;
                vid.loop = true;
                viewerContent.appendChild(vid);
            }
            
            mediaViewer.style.display = 'flex';
        }

        viewerBackBtn.addEventListener('click', () => {
            viewerContent.innerHTML = ''; // Stop video
            mediaViewer.style.display = 'none';
            currentViewingItem = null;
        });

        viewerDownloadBtn.addEventListener('click', () => {
            if (!currentViewingItem) return;
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = currentViewingItem.url;
            
            // Format name: VID_12345.webm or IMG_12345.jpg
            const prefix = currentViewingItem.type === 'image' ? 'IMG' : 'VID';
            a.download = `${prefix}_${currentViewingItem.id}.${currentViewingItem.ext}`;
            
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });

        // ----------------------------------------------------
        // IMAGE PROCESSING LOOP & GLITCH ENGINE
        // ----------------------------------------------------
        function renderLoop(timestamp) {
            requestAnimationFrame(renderLoop);

            const elapsed = timestamp - lastFrameTime;
            if (elapsed < frameInterval) return;
            lastFrameTime = timestamp - (elapsed % frameInterval);

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                
                const videoAspect = video.videoWidth / video.videoHeight;
                const canvasAspect = INTERNAL_WIDTH / INTERNAL_HEIGHT;
                
                let drawWidth = INTERNAL_WIDTH;
                let drawHeight = INTERNAL_HEIGHT;
                let offsetX = 0;
                let offsetY = 0;

                if (videoAspect > canvasAspect) {
                    drawWidth = INTERNAL_HEIGHT * videoAspect;
                    offsetX = -(drawWidth - INTERNAL_WIDTH) / 2;
                } else {
                    drawHeight = INTERNAL_WIDTH / videoAspect;
                    offsetY = -(drawHeight - INTERNAL_HEIGHT) / 2;
                }

                offCtx.drawImage(video, offsetX, offsetY, drawWidth, drawHeight);

                let imgData = offCtx.getImageData(0, 0, INTERNAL_WIDTH, INTERNAL_HEIGHT);
                let data = imgData.data;

                const contrast = 55; // Lowered contrast slightly for smoother transitions
                const contrastFactor = (259 * (contrast + 255)) / (255 * (259 - contrast));
                const saturation = 0.85; 

                for (let i = 0; i < data.length; i += 4) {
                    let r = data[i];
                    let g = data[i + 1];
                    let b = data[i + 2];

                    // Contrast
                    r = contrastFactor * (r - 128) + 128;
                    g = contrastFactor * (g - 128) + 128;
                    b = contrastFactor * (b - 128) + 128;

                    let luma = 0.299 * r + 0.587 * g + 0.114 * b;

                    // Crushing (Smoothed out the intensity of the pure blacks and whites)
                    if (luma > 180) {
                        const over = (luma - 180) * 1.2; 
                        r += over; g += over; b += over;
                    } else if (luma < 70) {
                        const under = (70 - luma) * 1.1; 
                        r -= under; g -= under; b -= under;
                    }

                    // Saturation
                    let newLuma = 0.299 * r + 0.587 * g + 0.114 * b;
                    r = newLuma + saturation * (r - newLuma);
                    g = newLuma + saturation * (g - newLuma);
                    b = newLuma + saturation * (b - newLuma);

                    data[i] = Math.min(255, Math.max(0, r));
                    data[i + 1] = Math.min(255, Math.max(0, g));
                    data[i + 2] = Math.min(255, Math.max(0, b));
                }

                // ==========================================
                // GLITCH ENGINE (Only triggers during video recording)
                // ==========================================
                if (isRecording && Math.random() < 0.15) { // Slightly lower glitch chance due to higher FPS
                    
                    // Horizontal Tearing
                    if (Math.random() > 0.3) {
                        const startY = Math.floor(Math.random() * INTERNAL_HEIGHT);
                        const sliceHeight = Math.floor(Math.random() * 25) + 5; 
                        const shiftX = Math.floor((Math.random() - 0.5) * 40); 
                        
                        for (let y = startY; y < startY + sliceHeight && y < INTERNAL_HEIGHT; y++) {
                            for (let x = 0; x < INTERNAL_WIDTH; x++) {
                                let targetX = x + shiftX;
                                if (targetX >= 0 && targetX < INTERNAL_WIDTH) {
                                    let srcIdx = (y * INTERNAL_WIDTH + x) * 4;
                                    let dstIdx = (y * INTERNAL_WIDTH + targetX) * 4;
                                    data[dstIdx] = data[srcIdx];     // R
                                    data[dstIdx+1] = data[srcIdx+1]; // G
                                    data[dstIdx+2] = data[srcIdx+2]; // B
                                }
                            }
                        }
                    }

                    // Color Block Corruption
                    if (Math.random() > 0.7) {
                        const blockX = Math.floor(Math.random() * INTERNAL_WIDTH);
                        const blockY = Math.floor(Math.random() * INTERNAL_HEIGHT);
                        const blockSize = Math.floor(Math.random() * 50) + 15;
                        const corruptR = Math.random() > 0.5 ? 255 : 0;
                        const corruptG = Math.random() > 0.5 ? 255 : 0;

                        for (let y = blockY; y < blockY + blockSize && y < INTERNAL_HEIGHT; y+=2) {
                            for (let x = blockX; x < blockX + blockSize && x < INTERNAL_WIDTH; x+=2) {
                                let idx = (y * INTERNAL_WIDTH + x) * 4;
                                data[idx] = corruptR; 
                                data[idx+1] = corruptG; 
                            }
                        }
                    }
                }
                
                offCtx.putImageData(imgData, 0, 0);

                // Draw to main screen
                const displayAspect = displayCanvas.width / displayCanvas.height;
                let finalWidth = displayCanvas.width;
                let finalHeight = displayCanvas.height;
                let finalX = 0;
                let finalY = 0;

                if (canvasAspect > displayAspect) {
                    finalWidth = displayCanvas.height * canvasAspect;
                    finalX = -(finalWidth - displayCanvas.width) / 2;
                } else {
                    finalHeight = displayCanvas.width / canvasAspect;
                    finalY = -(finalHeight - displayCanvas.height) / 2;
                }

                ctx.drawImage(offCanvas, finalX, finalY, finalWidth, finalHeight);
            }
        }
    </script>
</body>
